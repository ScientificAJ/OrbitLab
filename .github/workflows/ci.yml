name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,science,api,ml]"

      - name: Fetch Nigraha test artifact
        run: python scripts/fetch_nigraha_weights.py

      - name: Run backend tests
        run: pytest --cov=orbitlab --cov-report=term-missing --cov-report=xml

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml

      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: backend
          fail_ci_if_error: false

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Check frontend formatting
        run: npm run format:check --prefix frontend

      - name: Lint frontend
        run: npm run lint --prefix frontend

      - name: Run frontend unit tests
        run: npm run test:unit --prefix frontend

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run mocked frontend e2e tests
        run: npm run test:e2e --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend
