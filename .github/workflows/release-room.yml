name: Science Provenance Release Room

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to package, for example v0.2.0"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: release-room-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  release-room:
    name: Build and attest release room
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
      RELEASE_ROOM_DIR: .orbitlab/releases/${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,science,api,ml]"

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Fetch release model artifacts
        run: |
          python scripts/fetch_nigraha_weights.py
          python scripts/fetch_kepler_astronet.py
          python scripts/fetch_k2_exomac_kkt.py

      - name: Build science provenance release room
        run: |
          python scripts/build_release_room.py \
            --tag "$RELEASE_TAG" \
            --output-dir "$RELEASE_ROOM_DIR" \
            --benchmark-mode fast \
            --clean

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: orbitlab-release-room-${{ env.RELEASE_TAG }}
          path: ${{ env.RELEASE_ROOM_DIR }}
          retention-days: 90

      - name: Attest release room archive
        uses: actions/attest@v4
        with:
          subject-path: ${{ env.RELEASE_ROOM_DIR }}/orbitlab-release-room-${{ env.RELEASE_TAG }}.zip

      - name: Attest release room SBOM
        uses: actions/attest@v4
        with:
          subject-path: ${{ env.RELEASE_ROOM_DIR }}/orbitlab-release-room-${{ env.RELEASE_TAG }}.zip
          sbom-path: ${{ env.RELEASE_ROOM_DIR }}/sbom.spdx.json

      - name: Upload assets to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$RELEASE_TAG" "$RELEASE_ROOM_DIR"/* --clobber
