name: Model artifact
description: Track a model artifact source, checksum, or readiness issue.
title: "[Model artifact]: "
labels: ["ml", "artifact"]
body:
  - type: input
    id: model_id
    attributes:
      label: Model ID
      placeholder: nigraha-tess-global-nodropout-binary-ensemble
    validations:
      required: true
  - type: input
    id: mission
    attributes:
      label: Mission
      placeholder: TESS, Kepler, or K2
    validations:
      required: true
  - type: textarea
    id: source
    attributes:
      label: Source and version
      description: Repository, commit, release, DOI, or Hugging Face revision.
    validations:
      required: true
  - type: textarea
    id: checksum
    attributes:
      label: Checksum evidence
      description: SHA-256 values, registry output, or mismatch details.
  - type: textarea
    id: contract
    attributes:
      label: Input contract
      description: Expected tensors or tabular features.
  - type: textarea
    id: limitations
    attributes:
      label: Limitations
      description: Known scope, caveats, or unavailable pieces.
