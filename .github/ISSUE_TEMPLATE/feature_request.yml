name: Feature request
description: Suggest a product, science, API, or contributor-experience improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or science workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should OrbitLab add or change?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend
        - Backend API
        - Science pipeline
        - ML artifacts
        - Deployment
        - Documentation
        - Contributor workflow
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Links, references, target examples, or constraints.
