coverage:
  status:
    project:
      backend:
        target: 100%
        threshold: 0%
        flags:
          - backend
      frontend:
        target: 100%
        threshold: 0%
        flags:
          - frontend
    patch:
      default:
        target: 100%
        threshold: 0%

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: true

flags:
  backend:
    paths:
      - backend/orbitlab/
    carryforward: true
  frontend:
    paths:
      - frontend/src/
    carryforward: true

ignore:
  - "backend/tests/"
  - "frontend/src/**/*.test.ts"
  - "frontend/src/**/*.test.tsx"
  - "scripts/"
  - "docs/"
